<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Macro War Room | Quantum Terminal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #ef4444;
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(239, 68, 68, 0.05) 0%, transparent 40%);
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            min-h: 100vh;
            overflow-x: hidden;
        }

        .glass {
            background: var(--card);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .terminal-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .terminal-scroll::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .terminal-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .glow-text-red {
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        .glow-text-blue {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes scanline {
            0% {
                transform: translateY(-100%);
            }

            100% {
                transform: translateY(100%);
            }
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(59, 130, 246, 0.2), transparent);
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        .tooltip {
            position: absolute;
            background: #1e293b;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .has-tooltip:hover .tooltip {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const MotionLib = window.FramerMotion || window.Motion || {};
        const { motion, AnimatePresence } = MotionLib;

        const AGENT_STATES = {
            IDLE: 'Idle',
            SEARCHING: 'Searching',
            ANALYZING: 'Analyzing',
            COMPLETE: 'Complete'
        };

        const RESEARCH_DATA = {
            FOMC: {
                sentiment: 'Hawkish Pause',
                score: 6.0,
                details: 'Fed held rates at 3.50-3.75%. Inflation remains "somewhat elevated". Logan (Dallas Fed) signaling reluctance for further cuts.',
                mood: 'bearish'
            },
            QUANT: {
                price: 693.78,
                ma200: 645.02,
                deviation: '+7.55%',
                trend: 'Bullish'
            },
            RISK: {
                level: 8.5,
                news: 'High Risk. US-China tech restrictions. New START nuclear treaty expiration. Israel-Iran tensions intensifying.',
                status: 'Critical'
            }
        };

        const Icon = ({ name, className, size = 20 }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Gauge3D = ({ value }) => {
            // value 0 (Bearish/Danger) to 100 (Bullish/Secure)
            const rotation = (value / 100) * 180 - 90;

            return (
                <div className="relative w-72 h-40 flex items-center justify-center pt-8">
                    <svg viewBox="0 0 200 120" className="w-full h-full drop-shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                        <defs>
                            <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stopColor="#ef4444" />
                                <stop offset="50%" stopColor="#eab308" />
                                <stop offset="100%" stopColor="#3b82f6" />
                            </linearGradient>
                            <filter id="glow">
                                <feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
                                <feMerge>
                                    <feMergeNode in="coloredBlur" />
                                    <feMergeNode in="SourceGraphic" />
                                </feMerge>
                            </filter>
                        </defs>
                        {/* Background Arc */}
                        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#1e293b" strokeWidth="12" strokeLinecap="round" />
                        {/* Progress Arc */}
                        <motion.path
                            initial={{ pathLength: 0 }}
                            animate={{ pathLength: value / 100 }}
                            transition={{ duration: 2, ease: "easeOut" }}
                            d="M 20 100 A 80 80 0 0 1 180 100"
                            fill="none"
                            stroke="url(#gaugeGrad)"
                            strokeWidth="12"
                            strokeLinecap="round"
                            filter="url(#glow)"
                        />
                        {/* Ticks */}
                        {[0, 25, 50, 75, 100].map(tick => {
                            const angle = (tick / 100) * 180 - 180;
                            const rad = (angle * Math.PI) / 180;
                            const x1 = 100 + 85 * Math.cos(rad);
                            const y1 = 100 + 85 * Math.sin(rad);
                            const x2 = 100 + 95 * Math.cos(rad);
                            const y2 = 100 + 95 * Math.sin(rad);
                            return <line key={tick} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#475569" strokeWidth="2" />;
                        })}
                    </svg>

                    {/* Needle */}
                    <motion.div
                        animate={{ rotate: rotation }}
                        transition={{ type: "spring", damping: 10, stiffness: 50 }}
                        style={{ originX: "50%", originY: "100%", bottom: "20px" }}
                        className="absolute w-1.5 h-32 bg-white rounded-full z-10 shadow-[0_0_20px_white]"
                    >
                        <div className="w-full h-1/2 bg-gradient-to-t from-white to-transparent" />
                    </motion.div>

                    {/* Center Hub */}
                    <div className="absolute bottom-[10px] w-10 h-10 bg-slate-900 border-4 border-slate-700 rounded-full z-20 flex items-center justify-center shadow-xl">
                        <div className="w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_8px_#3b82f6]" />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [analystState, setAnalystState] = useState(AGENT_STATES.IDLE);
            const [quantState, setQuantState] = useState(AGENT_STATES.IDLE);
            const [riskState, setRiskState] = useState(AGENT_STATES.IDLE);
            const [logs, setLogs] = useState([]);
            const [confidence, setConfidence] = useState(0);
            const [isScanning, setIsScanning] = useState(false);
            const consoleEndRef = useRef(null);

            const scrollConsole = () => {
                consoleEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollConsole();
                if (window.lucide) window.lucide.createIcons();
            }, [logs]);

            const addLog = async (agent, message, speed = 20) => {
                const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
                const newLog = { agent, message: '', timestamp, id: Date.now() + Math.random() };

                setLogs(prev => [...prev, newLog]);

                // Typing effect
                for (let i = 0; i <= message.length; i++) {
                    setLogs(prev => prev.map(l => l.id === newLog.id ? { ...l, message: message.slice(0, i) } : l));
                    await new Promise(r => setTimeout(r, speed));
                }
            };

            const initializeScan = async () => {
                if (isScanning) return;
                setIsScanning(true);
                setLogs([]);
                setConfidence(0);
                setAnalystState(AGENT_STATES.IDLE);
                setQuantState(AGENT_STATES.IDLE);
                setRiskState(AGENT_STATES.IDLE);

                await addLog('SYSTEM', 'Initiating Multithreaded Global Macro Infrastructure...', 10);
                await new Promise(r => setTimeout(r, 800));

                // 1. Analyst Agent
                setAnalystState(AGENT_STATES.SEARCHING);
                await addLog('Analyst', 'Accessing Federal Reserve API & FOMC Transcript archives...');
                await new Promise(r => setTimeout(r, 1200));
                setAnalystState(AGENT_STATES.ANALYZING);
                await addLog('Analyst', `NLP Analysis: Tone is ${RESEARCH_DATA.FOMC.sentiment}. Hawk Score identified: ${RESEARCH_DATA.FOMC.score}/10.`);
                await new Promise(r => setTimeout(r, 1000));
                setAnalystState(AGENT_STATES.COMPLETE);
                await addLog('Analyst', `Final Inference: ${RESEARCH_DATA.FOMC.details}`);

                // 2. Quant Agent
                setQuantState(AGENT_STATES.SEARCHING);
                await addLog('Quant', 'Pulling real-time $SPY candles and compute cluster for MA200...');
                await new Promise(r => setTimeout(r, 1200));
                setQuantState(AGENT_STATES.ANALYZING);
                await addLog('Quant', `Price: $${RESEARCH_DATA.QUANT.price} | MA200: $${RESEARCH_DATA.QUANT.ma200}. Deviation: ${RESEARCH_DATA.QUANT.deviation}.`);
                await new Promise(r => setTimeout(r, 1000));
                setQuantState(AGENT_STATES.COMPLETE);
                await addLog('Quant', `Trend: ${RESEARCH_DATA.QUANT.trend}. Market structural integrity remains intact.`);

                // 3. Risk Agent
                setRiskState(AGENT_STATES.SEARCHING);
                await addLog('Risk', 'Scraping G7 news feeds and Geopolitical Risk Index (GPR)...');
                await new Promise(r => setTimeout(r, 1200));
                setRiskState(AGENT_STATES.ANALYZING);
                await addLog('Risk', `Geopolitical Flux detected. Severity: ${RESEARCH_DATA.RISK.level}/10. News clusters: ${RESEARCH_DATA.RISK.news.split('.')[0]}.`);
                await new Promise(r => setTimeout(r, 1000));
                setRiskState(AGENT_STATES.COMPLETE);
                await addLog('Risk', `Risk Status: ${RESEARCH_DATA.RISK.status}. Tail risk hedging recommended.`);

                // Final Sync
                await addLog('SYSTEM', 'All agents reporting COMPLETE. Synchronizing Confidence Matrix...', 10);
                await new Promise(r => setTimeout(r, 1500));

                // Logic-based confidence: Base 50 + Trend Bonus - Hawk Penalty - Risk Penalty
                const calculatedConfidence = 50 + (RESEARCH_DATA.QUANT.price > RESEARCH_DATA.QUANT.ma200 ? 25 : -25)
                    - (RESEARCH_DATA.FOMC.score - 5) * 5
                    - (RESEARCH_DATA.RISK.level - 5) * 5;
                setConfidence(Math.max(5, Math.min(95, calculatedConfidence)));
                await addLog('SYSTEM', `Synthesis ready. Aggregate Confidence: ${calculatedConfidence.toFixed(1)}%.`, 10);
                setIsScanning(false);
            };

            const resetSystem = () => {
                setAnalystState(AGENT_STATES.IDLE);
                setQuantState(AGENT_STATES.IDLE);
                setRiskState(AGENT_STATES.IDLE);
                setLogs([]);
                setConfidence(0);
                setIsScanning(false);
            };

            const clearConsole = () => setLogs([]);

            // Kill Switch Logic: analyst_sentiment == 'bearish' AND price < ma200
            // Note: In our real data, price > ma200, so it won't be disabled. 
            // We'll show a demonstration state if needed, but per request we use research values.
            const isBearish = RESEARCH_DATA.FOMC.mood === 'bearish';
            const isBelowMA = RESEARCH_DATA.QUANT.price < RESEARCH_DATA.QUANT.ma200;
            const isTradeDisabled = isBearish && isBelowMA;

            return (
                <div className="min-h-screen flex flex-col p-4 md:p-8 max-w-7xl mx-auto gap-6 relative">
                    <div className="scanline" />

                    {/* Header */}
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-white/5 pb-6">
                        <div className="flex items-center gap-4">
                            <div className="relative">
                                <Icon name="globe" className="text-blue-500 animate-pulse" size={32} />
                                <div className="absolute inset-0 bg-blue-500/20 blur-xl rounded-full" />
                            </div>
                            <div>
                                <h1 className="text-3xl md:text-4xl font-black italic tracking-tighter uppercase glow-text-blue">
                                    War Room <span className="text-white/20 not-italic font-light">//</span> Macro Terminal
                                </h1>
                                <p className="text-[10px] mono text-blue-400/60 tracking-[0.3em] font-bold">QUANTUM-ENCRYPTED ALPHA FEED v8.4.2</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6 px-4 py-2 glass rounded-full">
                            <div className="text-right">
                                <p className="text-[10px] text-slate-500 font-bold uppercase">System Latency</p>
                                <p className="mono text-xs text-green-400">1.2ms</p>
                            </div>
                            <div className="h-8 w-px bg-white/10" />
                            <div className="text-right">
                                <p className="text-[10px] text-slate-500 font-bold uppercase">Market Status</p>
                                <p className="mono text-xs text-blue-400 font-bold">LIVE_FEED</p>
                            </div>
                        </div>
                    </header>

                    {/* Dashboard Grid */}
                    <main className="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">

                        {/* Left: Intelligence Summary */}
                        <aside className="lg:col-span-4 flex flex-col gap-6">

                            {/* Confidence Card */}
                            <section className="glass rounded-3xl p-8 flex flex-col items-center text-center relative overflow-hidden group">
                                <div className="absolute top-0 right-0 p-4 opacity-20 group-hover:opacity-100 transition-opacity">
                                    <Icon name="zap" className="text-yellow-400" />
                                </div>
                                <h3 className="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Strategic Confidence Index</h3>
                                <Gauge3D value={confidence} />
                                <div className="mt-6">
                                    <motion.span
                                        key={confidence}
                                        initial={{ scale: 0.8, opacity: 0 }}
                                        animate={{ scale: 1, opacity: 1 }}
                                        className="text-6xl font-black tracking-tighter tabular-nums"
                                    >
                                        {confidence.toFixed(0)}<span className="text-2xl text-slate-600">%</span>
                                    </motion.span>
                                    <p className={`text-[10px] font-bold uppercase mt-2 tracking-widest ${confidence > 60 ? 'text-blue-400' : confidence < 40 ? 'text-red-400' : 'text-yellow-400'}`}>
                                        {confidence > 60 ? 'Bullish Dominance' : confidence < 40 ? 'Risk Aversion High' : 'Neutral Equilibrium'}
                                    </p>
                                </div>
                            </section>

                            {/* Agent Command Center */}
                            <section className="flex flex-col gap-3">
                                {[
                                    { name: 'Analyst Agent', state: analystState, task: 'Monetary Policy', icon: 'shield' },
                                    { name: 'Quant Agent', state: quantState, task: 'Market Structure', icon: 'activity' },
                                    { name: 'Risk Agent', state: riskState, task: 'Geopolitical Flux', icon: 'alert-octagon' }
                                ].map((agent, i) => (
                                    <motion.div
                                        key={agent.name}
                                        initial={{ opacity: 0, x: -20 }}
                                        animate={{ opacity: 1, x: 0 }}
                                        transition={{ delay: i * 0.1 }}
                                        className={`glass p-4 rounded-2xl flex items-center justify-between border-l-4 transition-all duration-500 ${agent.state === AGENT_STATES.COMPLETE ? 'border-blue-500 bg-blue-500/5' :
                                            agent.state === AGENT_STATES.IDLE ? 'border-slate-800' : 'border-yellow-500 animate-pulse shadow-[0_0_15px_rgba(234,179,8,0.1)]'
                                            }`}
                                    >
                                        <div className="flex items-center gap-4">
                                            <div className={`p-2 rounded-xl ${agent.state === AGENT_STATES.COMPLETE ? 'bg-blue-500/20 text-blue-400' : 'bg-slate-800 text-slate-500'}`}>
                                                <Icon name={agent.icon} size={18} />
                                            </div>
                                            <div>
                                                <h4 className="text-sm font-bold">{agent.name}</h4>
                                                <p className="text-[10px] text-slate-500 uppercase tracking-tighter">{agent.task}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <span className={`text-[9px] px-2 py-0.5 rounded-full font-black uppercase ${agent.state === AGENT_STATES.COMPLETE ? 'bg-green-500/10 text-green-400' :
                                                agent.state === AGENT_STATES.IDLE ? 'bg-slate-700/20 text-slate-600' : 'bg-yellow-500/10 text-yellow-500'
                                                }`}>
                                                {agent.state}
                                            </span>
                                        </div>
                                    </motion.div>
                                ))}
                            </section>
                        </aside>

                        {/* Right: Tactical Operations */}
                        <div className="lg:col-span-8 flex flex-col gap-6">

                            {/* Live Chat Transcript */}
                            <section className="glass rounded-3xl flex flex-col overflow-hidden min-h-[400px] flex-grow border border-white/5 shadow-2xl">
                                <div className="bg-white/5 px-6 py-4 border-b border-white/5 flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <div className="flex gap-1.5">
                                            <div className="w-2.5 h-2.5 bg-red-500/20 border border-red-500/50 rounded-full" />
                                            <div className="w-2.5 h-2.5 bg-yellow-500/20 border border-yellow-500/50 rounded-full" />
                                            <div className="w-2.5 h-2.5 bg-green-500/20 border border-green-500/50 rounded-full" />
                                        </div>
                                        <span className="text-[10px] mono font-bold uppercase tracking-[0.3em] text-slate-500">Live_Transcript :: Internal_Agent_Comms</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-[9px] bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded border border-blue-500/20 font-bold">SECURE_VPN</span>
                                    </div>
                                </div>

                                <div className="p-6 overflow-y-auto terminal-scroll mono text-xs md:text-sm space-y-4 bg-black/20 flex-grow content-start">
                                    <AnimatePresence>
                                        {logs.length === 0 ? (
                                            <motion.div
                                                initial={{ opacity: 0 }}
                                                animate={{ opacity: 1 }}
                                                className="text-slate-700 flex flex-col items-center justify-center h-full gap-4 pt-12"
                                            >
                                                <Icon name="search" size={48} className="opacity-10" />
                                                <p className="italic font-light tracking-widest uppercase text-[10px]">Awaiting Signal Initialization...</p>
                                            </motion.div>
                                        ) : (
                                            logs.map((log) => (
                                                <motion.div
                                                    key={log.id}
                                                    initial={{ opacity: 0, y: 10 }}
                                                    animate={{ opacity: 1, y: 0 }}
                                                    className="flex gap-4 group"
                                                >
                                                    <span className="text-slate-600 shrink-0 font-bold">[{log.timestamp}]</span>
                                                    <span className={`shrink-0 font-black uppercase text-[11px] w-20 tracking-tighter ${log.agent === 'Analyst' ? 'text-blue-400' :
                                                        log.agent === 'Quant' ? 'text-purple-400' :
                                                            log.agent === 'Risk' ? 'text-orange-400' :
                                                                log.agent === 'SYSTEM' ? 'text-red-500 font-black italic' : 'text-slate-400'
                                                        }`}>
                                                        {log.agent}
                                                    </span>
                                                    <span className="text-slate-300 leading-relaxed font-medium">{log.message}</span>
                                                </motion.div>
                                            ))
                                        )}
                                    </AnimatePresence>
                                    <div ref={consoleEndRef} />
                                </div>
                            </section>

                            {/* Tactical Controls */}
                            <footer className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <button
                                    onClick={initializeScan}
                                    disabled={isScanning}
                                    className={`md:col-span-2 group relative overflow-hidden h-16 rounded-2xl font-black uppercase tracking-widest transition-all ${isScanning ? 'bg-slate-900 border-slate-800 text-slate-600' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-[0_0_20px_rgba(59,130,246,0.3)] hover:scale-[1.02]'
                                        } border border-white/10 flex items-center justify-center gap-3`}
                                >
                                    <Icon name={isScanning ? "loader-2" : "power"} className={isScanning ? 'animate-spin' : ''} />
                                    <span>Initialize Global Scan</span>
                                    {!isScanning && <div className="absolute inset-0 bg-white/10 -translate-x-full group-hover:translate-x-full transition-transform duration-1000 skew-x-12" />}
                                </button>

                                <div className="has-tooltip relative">
                                    <button
                                        disabled={isTradeDisabled}
                                        className={`w-full h-16 rounded-2xl font-black uppercase tracking-widest transition-all flex items-center justify-center gap-3 ${isTradeDisabled
                                            ? 'bg-slate-800 text-slate-600 border-slate-700 cursor-not-allowed opacity-50'
                                            : 'bg-red-600 hover:bg-red-500 text-white shadow-[0_0_20px_rgba(239,68,68,0.3)] animate-pulse'
                                            } border border-white/10`}
                                    >
                                        <Icon name="crosshair" />
                                        <span>Execute Trade</span>
                                    </button>
                                    {isTradeDisabled && (
                                        <div className="tooltip z-50">
                                            Consensus: High Risk (Bearish & Below MA200)
                                        </div>
                                    )}
                                </div>

                                <div className="flex gap-2">
                                    <button
                                        onClick={clearConsole}
                                        className="flex-1 glass hover:bg-white/10 rounded-2xl flex items-center justify-center text-slate-400 transition-all hover:text-white"
                                    >
                                        <Icon name="trash-2" size={18} />
                                    </button>
                                    <button
                                        onClick={resetSystem}
                                        className="flex-1 glass hover:bg-white/10 rounded-2xl flex items-center justify-center text-slate-400 transition-all hover:text-white"
                                    >
                                        <Icon name="refresh-ccw" size={18} />
                                    </button>
                                </div>
                            </footer>
                        </div>
                    </main>

                    {/* Footer System Status */}
                    <footer className="mt-4 flex flex-col md:flex-row justify-between items-center text-[10px] mono text-slate-600 gap-4 uppercase font-bold tracking-[0.2em]">
                        <div className="flex gap-6">
                            <span className="flex items-center gap-2">
                                <div className="w-1.5 h-1.5 bg-green-500 rounded-full" /> Uplink: Stable
                            </span>
                            <span className="flex items-center gap-2">
                                <div className="w-1.5 h-1.5 bg-blue-500 rounded-full" /> Encryption: AES-4096
                            </span>
                        </div>
                        <div className="flex gap-6">
                            <span>Sector: GMT-6</span>
                            <span>Node: TERMINAL_ALPHA_BRAVO</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
